<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizDərs — Müəllim Ekranı</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d1a;--card:#161628;--border:rgba(255,255,255,0.07);
  --a:#ff6b6b;--b:#4ecdc4;--c:#45b7d1;--d:#f9ca24;
  --green:#06d6a0;--purple:#a855f7;--text:#f0f0ff;--muted:#6b6b9a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow:hidden;}

/* Animated stars bg */
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 100% 60% at 50% 0%,rgba(168,85,247,0.12) 0%,transparent 70%);
  pointer-events:none;z-index:0;}

canvas#stars{position:fixed;inset:0;z-index:0;opacity:0.4;}
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;}

/* AVATARS - CSS animated */
.av{display:inline-block;font-size:2rem;line-height:1;transition:transform 0.2s;}

/* ===== LOBBY ===== */
#lobby{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;}
.logo-wrap{text-align:center;margin-bottom:40px;}
.logo{font-size:clamp(2.5rem,5vw,4.5rem);font-weight:900;letter-spacing:-2px;
  background:linear-gradient(135deg,#a855f7,#06d6a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--muted);margin-top:4px;letter-spacing:3px;}

.url-box{background:var(--card);border:2px solid rgba(168,85,247,0.4);border-radius:20px;padding:28px 50px;text-align:center;margin-bottom:36px;
  box-shadow:0 0 60px rgba(168,85,247,0.1);}
.url-label{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.url-text{font-size:clamp(1.3rem,2.5vw,2rem);font-weight:800;color:#a855f7;}
.url-hint{font-size:.8rem;color:var(--muted);margin-top:6px;font-family:'Space Mono',monospace;}

.lobby-meta{display:flex;gap:40px;align-items:center;margin-bottom:32px;}
.live-badge{display:flex;align-items:center;gap:10px;}
.pulse-dot{width:12px;height:12px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(6,214,160,0.4)}50%{opacity:.7;box-shadow:0 0 0 8px transparent}}
.count-text{font-family:'Space Mono',monospace;font-size:1.1rem;}
.count-text b{color:var(--green);font-size:1.5rem;}

.players-wrap{max-width:900px;width:100%;}
#players-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;min-height:56px;}
.pchip{background:var(--card);border:1.5px solid rgba(168,85,247,0.35);border-radius:50px;
  padding:8px 18px;font-size:.9rem;font-weight:700;display:flex;align-items:center;gap:8px;
  animation:pop .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{opacity:0;transform:scale(0.4)}to{opacity:1;transform:scale(1)}}

.btn-start{margin-top:32px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;border:none;
  border-radius:16px;padding:20px 70px;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:900;
  cursor:pointer;transition:all .2s;box-shadow:0 8px 32px rgba(168,85,247,.4);letter-spacing:1px;}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(168,85,247,.5);}
.btn-start:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* ===== QUESTION ===== */
#qscreen{display:none;flex:1;flex-direction:column;}
.qtop{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;
  background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);flex-shrink:0;}
.qmeta{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted);}
.qmeta b{color:var(--text);}
.ans-pill{background:var(--card);border:1px solid var(--border);border-radius:50px;
  padding:8px 20px;font-family:'Space Mono',monospace;font-size:.85rem;}
.ans-pill b{color:var(--green);}

/* Timer */
.timer-wrap{position:relative;}
.timer-wrap svg{transform:rotate(-90deg);}
.trk-bg{fill:none;stroke:rgba(255,255,255,.07);stroke-width:5;}
.trk-fill{fill:none;stroke:var(--green);stroke-width:5;stroke-linecap:round;
  transition:stroke-dashoffset 1s linear,stroke .3s;}
.t-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Space Mono',monospace;font-size:1.4rem;font-weight:700;}

.qbody{flex:1;padding:30px 50px;display:flex;flex-direction:column;max-width:1100px;margin:0 auto;width:100%;}
.qbadge{background:rgba(168,85,247,.25);border:1px solid rgba(168,85,247,.4);color:#c084fc;
  border-radius:50px;padding:5px 18px;font-size:.75rem;font-family:'Space Mono',monospace;display:inline-block;margin-bottom:16px;}
.qtext{font-size:clamp(1.4rem,2.8vw,2.2rem);font-weight:900;line-height:1.35;margin-bottom:36px;text-align:center;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.ocard{border-radius:18px;padding:20px 26px;font-size:clamp(.95rem,1.6vw,1.2rem);font-weight:800;
  display:flex;align-items:center;gap:14px;position:relative;overflow:hidden;border:2px solid transparent;}
.ocard:nth-child(1){background:rgba(255,107,107,.15);border-color:var(--a);}
.ocard:nth-child(2){background:rgba(78,205,196,.15);border-color:var(--b);}
.ocard:nth-child(3){background:rgba(69,183,209,.15);border-color:var(--c);}
.ocard:nth-child(4){background:rgba(249,202,36,.15);border-color:var(--d);}
.oltr{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:.85rem;font-weight:700;flex-shrink:0;}
.ocard:nth-child(1) .oltr{background:var(--a);}
.ocard:nth-child(2) .oltr{background:var(--b);color:#000;}
.ocard:nth-child(3) .oltr{background:var(--c);color:#000;}
.ocard:nth-child(4) .oltr{background:var(--d);color:#000;}
.ocard.correct{transform:scale(1.03);box-shadow:0 0 40px rgba(6,214,160,.35);}
.ocard.wrong{opacity:.3;}
.obar{position:absolute;bottom:0;left:0;height:4px;width:0;transition:width .7s ease;border-radius:0 4px 4px 0;}
.ocard:nth-child(1) .obar{background:var(--a);}
.ocard:nth-child(2) .obar{background:var(--b);}
.ocard:nth-child(3) .obar{background:var(--c);}
.ocard:nth-child(4) .obar{background:var(--d);}

/* ===== RESULTS ===== */
#rscreen{display:none;flex:1;padding:30px 50px;overflow:auto;}
.rtitle{text-align:center;font-size:clamp(1.4rem,3vw,2.4rem);font-weight:900;margin-bottom:36px;}
.rtitle span{color:var(--green);}
.rbars{display:flex;gap:16px;align-items:flex-end;justify-content:center;height:180px;max-width:700px;margin:0 auto 40px;}
.rbi{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.rb{width:100%;border-radius:10px 10px 4px 4px;display:flex;align-items:flex-start;justify-content:center;
  padding-top:6px;font-family:'Space Mono',monospace;font-weight:700;font-size:.95rem;min-height:30px;}
.rbl{font-size:.7rem;font-family:'Space Mono',monospace;color:var(--muted);}
.sboard{max-width:600px;margin:0 auto;}
.sbtitle{font-size:.7rem;font-family:'Space Mono',monospace;color:var(--muted);text-align:center;letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;}
.srow{display:flex;align-items:center;gap:14px;background:var(--card);border-radius:14px;
  padding:14px 22px;margin-bottom:8px;border:1px solid var(--border);animation:slideIn .4s ease backwards;}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.srank{font-family:'Space Mono',monospace;font-size:.85rem;color:var(--muted);width:26px;}
.srank.g{color:#ffd700;font-weight:700;}.srank.s{color:#c0c0c0;font-weight:700;}.srank.b{color:#cd7f32;font-weight:700;}
.sname{flex:1;font-weight:800;}
.spts{font-family:'Space Mono',monospace;font-weight:700;color:var(--green);}
.spts.minus{color:var(--a);}
.btn-next{display:block;margin:28px auto 0;background:linear-gradient(135deg,var(--green),#00b4d8);
  color:#000;border:none;border-radius:14px;padding:16px 50px;font-family:'Nunito',sans-serif;
  font-size:1.1rem;font-weight:900;cursor:pointer;transition:all .2s;box-shadow:0 8px 28px rgba(6,214,160,.3);}
.btn-next:hover{transform:translateY(-2px);}

/* ===== FINAL ===== */
#fscreen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;overflow:auto;}
.flogo{font-size:clamp(2rem,4vw,3.5rem);font-weight:900;margin-bottom:8px;
  background:linear-gradient(135deg,#ffd700,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin:32px auto;max-width:580px;}
.pitem{display:flex;flex-direction:column;align-items:center;gap:10px;}
.pavatar{font-size:2.8rem;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pblock{width:130px;border-radius:14px 14px 0 0;display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:14px;font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700;}
.pblock.p1{height:160px;background:linear-gradient(180deg,#ffd700,#f59e0b);}
.pblock.p2{height:120px;background:linear-gradient(180deg,#e2e8f0,#94a3b8);color:#000;}
.pblock.p3{height:90px;background:linear-gradient(180deg,#cd7f32,#92400e);}
.pname{font-weight:800;font-size:.9rem;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pscore{font-family:'Space Mono',monospace;font-size:.8rem;color:var(--green);}
#fboard{max-width:500px;margin:0 auto;}
.btn-reset{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:12px;
  padding:14px 40px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:24px;}
.btn-reset:hover{background:#1e1e36;}

.confetti-c{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.cp{position:absolute;top:-20px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);}}

.hidden{display:none!important;}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="app">

<!-- LOBBY -->
<div id="lobby">
  <div class="logo-wrap">
    <div class="logo">⚡ QuizDərs</div>
    <div class="logo-sub">// müəllim ekranı — mövzu 7</div>
  </div>
  <div class="url-box">
    <div class="url-label">Tələbələr bu ünvana daxil olsun</div>
    <div class="url-text" id="join-url">yüklənir...</div>
    <div class="url-hint">telefon brauzerindən açılır · ad + obraz seçirlər</div>
  </div>
  <div class="lobby-meta">
    <div class="live-badge"><div class="pulse-dot"></div>
      <div class="count-text">Qoşulan: <b id="pcount">0</b></div>
    </div>
    <div style="color:var(--muted);font-size:.85rem;font-family:'Space Mono',monospace;">10 sual · 15 san/sual</div>
  </div>
  <div class="players-wrap"><div id="players-grid"></div></div>
  <button class="btn-start" id="btn-start" disabled onclick="startGame()">🚀 Oyunu Başlat</button>
</div>

<!-- QUESTION -->
<div id="qscreen">
  <div class="qtop">
    <div class="qmeta">Sual <b id="qnum">1</b>/<b id="qtotal">10</b></div>
    <div class="timer-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="trk-bg" cx="36" cy="36" r="30"/>
        <circle class="trk-fill" id="tring" cx="36" cy="36" r="30" stroke-dasharray="188.5" stroke-dashoffset="0"/>
      </svg>
      <div class="t-num" id="tnum">15</div>
    </div>
    <div class="ans-pill">Cavablar: <b id="acnt">0</b>/<b id="atot">0</b></div>
  </div>
  <div class="qbody">
    <div class="qbadge" id="qbadge">Sual 1</div>
    <div class="qtext" id="qtext">...</div>
    <div class="opts" id="opts"></div>
  </div>
</div>

<!-- RESULTS -->
<div id="rscreen">
  <div class="rtitle">Düzgün cavab: <span id="rcorrect">...</span></div>
  <div class="rbars" id="rbars"></div>
  <div class="sboard">
    <div class="sbtitle">📊 Cari Sıralama</div>
    <div id="slist"></div>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQ()">Növbəti Sual →</button>
</div>

<!-- FINAL -->
<div id="fscreen">
  <div class="confetti-c" id="confetti"></div>
  <div class="flogo">🏆 Oyun Bitti!</div>
  <div style="color:var(--muted);font-family:'Space Mono',monospace;font-size:.85rem;margin-bottom:8px;">// yekun nəticələr</div>
  <div class="podium" id="podium"></div>
  <div id="fboard"></div>
  <button class="btn-reset" onclick="resetGame()">🔄 Yeni Oyun</button>
</div>

</div>

<script>
// Stars canvas
const c=document.getElementById('stars'),ctx=c.getContext('2d');
function resizeC(){c.width=window.innerWidth;c.height=window.innerHeight;}
resizeC();window.addEventListener('resize',resizeC);
const stars=Array.from({length:120},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+.3,s:(Math.random()-.5)*.3}));
function drawStars(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.x+=s.s;if(s.x<0)s.x=c.width;if(s.x>c.width)s.x=0;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,0.8)';ctx.fill();});requestAnimationFrame(drawStars);}
drawStars();

const AVATARS=['🦊','🐼','🦁','🐯','🦄','🐸','🦋','🐙','🦀','🐬','🦖','🤖','👾','🎃','🦸','🧙','🧜','🦝','🦩','🎯'];
const HOST=window.location.host;
document.getElementById('join-url').textContent=`http://${HOST}/student`;

let ws,currentQ=null,currentOpts=[];

function connect(){ws=new WebSocket((location.protocol==="https:"?"wss://":"ws://")+HOST);ws.onopen=()=>ws.send(JSON.stringify({type:'host_connect'}));ws.onmessage=e=>handle(JSON.parse(e.data));ws.onclose=()=>setTimeout(connect,2000);}

function handle(msg){
  if(msg.type==='host_ok'){
    msg.players.forEach(p=>addChip(p));
    document.getElementById('pcount').textContent=msg.players.length;
    document.getElementById('btn-start').disabled=msg.players.length===0;
  }
  else if(msg.type==='player_joined'){
    addChip(msg.player);
    document.getElementById('pcount').textContent=msg.count;
    document.getElementById('btn-start').disabled=false;
  }
  else if(msg.type==='player_left'){
    const el=document.getElementById('chip-'+msg.name);if(el)el.remove();
    document.getElementById('pcount').textContent=msg.count;
    document.getElementById('btn-start').disabled=msg.count===0;
  }
  else if(msg.type==='question')showQ(msg);
  else if(msg.type==='timer')updateTimer(msg.timeLeft);
  else if(msg.type==='answer_count'){document.getElementById('acnt').textContent=msg.count;document.getElementById('atot').textContent=msg.total;}
  else if(msg.type==='answer_reveal')showResults(msg);
  else if(msg.type==='game_over')showFinal(msg.scoreboard);
  else if(msg.type==='reset')location.reload();
}

function addChip(p){
  if(document.getElementById('chip-'+p.name))return;
  const g=document.getElementById('players-grid');
  const d=document.createElement('div');d.className='pchip';d.id='chip-'+p.name;
  d.innerHTML=`<span>${AVATARS[p.avatar]||'🎓'}</span>${p.name}`;g.appendChild(d);
}

function startGame(){ws.send(JSON.stringify({type:'start_game'}));}

function showQ(msg){
  currentQ=msg;currentOpts=msg.options;
  show('qscreen');
  document.getElementById('qnum').textContent=msg.index+1;
  document.getElementById('qtotal').textContent=msg.total;
  document.getElementById('qbadge').textContent=`Sual ${msg.index+1}`;
  document.getElementById('qtext').textContent=msg.question;
  document.getElementById('acnt').textContent=0;
  document.getElementById('atot').textContent=Object.keys({}).length||'?';
  updateTimer(msg.time);
  const L=['A','B','C','D'];const oc=document.getElementById('opts');oc.innerHTML='';
  msg.options.forEach((o,i)=>{
    const d=document.createElement('div');d.className='ocard';d.id='oc'+i;
    d.innerHTML=`<div class="oltr">${L[i]}</div><span>${o}</span><div class="obar" id="ob${i}"></div>`;
    oc.appendChild(d);
  });
}

function updateTimer(t){
  document.getElementById('tnum').textContent=t;
  const dash=188.5;const off=dash-(t/15)*dash;
  const r=document.getElementById('tring');r.style.strokeDashoffset=off;
  r.style.stroke=t<=4?'#ff6b6b':t<=8?'#f9ca24':'#06d6a0';
}

function showResults(msg){
  show('rscreen');
  document.getElementById('rcorrect').textContent=currentOpts[msg.correct];
  for(let i=0;i<4;i++){const c=document.getElementById('oc'+i);if(c)c.classList.add(i===msg.correct?'correct':'wrong');}
  const bars=document.getElementById('rbars');bars.innerHTML='';
  const cols=[getComputedStyle(document.documentElement).getPropertyValue('--a').trim(),'#4ecdc4','#45b7d1','#f9ca24'];
  const L=['A','B','C','D'];const mx=Math.max(...msg.answerCounts,1);
  msg.answerCounts.forEach((n,i)=>{
    const h=Math.max(28,(n/mx)*155);
    const bi=document.createElement('div');bi.className='rbi';
    bi.innerHTML=`<div class="rb" style="height:${h}px;background:${cols[i]};color:${i>1?'#000':'#fff'}">${n}</div><div class="rbl">${L[i]}${i===msg.correct?' ✓':''}</div>`;
    bars.appendChild(bi);
  });
  const sl=document.getElementById('slist');sl.innerHTML='';
  const rnks=['🥇','🥈','🥉'];
  msg.scoreboard.slice(0,8).forEach((p,i)=>{
    const row=document.createElement('div');row.className='srow';row.style.animationDelay=`${i*.08}s`;
    const rk=rnks[i]||(i+1)+'.';
    row.innerHTML=`<div class="srank ${i===0?'g':i===1?'s':i===2?'b':''}">${rk}</div>
      <div style="font-size:1.3rem">${AVATARS[p.avatar]||'🎓'}</div>
      <div class="sname">${p.name}</div>
      <div class="spts">${p.score} xal</div>`;
    sl.appendChild(row);
  });
  if(currentQ&&currentQ.index>=currentQ.total-1)document.getElementById('btn-next').textContent='🏆 Nəticələrə Bax';
  else document.getElementById('btn-next').textContent='Növbəti Sual →';
}

function nextQ(){ws.send(JSON.stringify({type:'next_question'}));}

function showFinal(sb){
  show('fscreen');
  const podium=document.getElementById('podium');podium.innerHTML='';
  const top3=sb.slice(0,3);const order=[1,0,2];
  order.forEach(idx=>{
    if(!top3[idx])return;
    const p=top3[idx];const div=document.createElement('div');div.className='pitem';
    div.innerHTML=`<div class="pavatar" style="animation-delay:${idx*.3}s">${AVATARS[p.avatar]||'🎓'}</div>
      <div class="pname">${p.name}</div><div class="pscore">${p.score} xal</div>
      <div class="pblock p${idx+1}">${idx+1}</div>`;
    podium.appendChild(div);
  });
  const fb=document.getElementById('fboard');fb.innerHTML='';
  const rnks=['🥇','🥈','🥉'];
  sb.forEach((p,i)=>{
    const row=document.createElement('div');row.className='srow';row.style.animationDelay=`${i*.07}s`;
    row.innerHTML=`<div class="srank ${i===0?'g':i===1?'s':i===2?'b':''}">${rnks[i]||(i+1)+'.'}</div>
      <div style="font-size:1.3rem">${AVATARS[p.avatar]||'🎓'}</div>
      <div class="sname">${p.name}</div><div class="spts">${p.score} xal</div>`;
    fb.appendChild(row);
  });
  launchConfetti();
}

function launchConfetti(){
  const cc=document.getElementById('confetti');
  const cols=['#a855f7','#06d6a0','#f9ca24','#ff6b6b','#4ecdc4'];
  for(let i=0;i<90;i++){const p=document.createElement('div');p.className='cp';
    p.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;`;
    cc.appendChild(p);}
}

function resetGame(){ws.send(JSON.stringify({type:'reset'}));}

function show(id){
  ['lobby','qscreen','rscreen','fscreen'].forEach(s=>document.getElementById(s).style.display=s===id?'flex':'none');
}

connect();
</script>
</body>
</html>
